<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Medical System - Login</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="login-container">


    <div class="login-card">


        <h1>🏥 Medical System</h1>

        <p>
            Sistema de gestión médica
        </p>


        <form id="loginForm">


            <label>
                Correo
            </label>

            <input 
                type="email"
                id="correo"
                placeholder="admin@medical.com"
                required
            >



            <label>
                Contraseña
            </label>

            <input 
                type="password"
                id="password"
                placeholder="******"
                required
            >



            <button type="submit">
                Ingresar
            </button>


        </form>


    </div>


</div>



<script src="js/api.js"></script>
<script src="js/login.js"></script>


</body>

</html>
