<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - Medical System</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="login-container">


<div class="login-card">


<h1>
🏥 Medical System
</h1>


<p>
Crear nueva cuenta
</p>



<form id="registerForm">


<label>
Nombre
</label>

<input 
type="text"
id="nombre"
placeholder="Ingrese su nombre"
required
>


<label>
Correo
</label>

<input 
type="email"
id="correo"
placeholder="correo@gmail.com"
required
>



<label>
Contraseña
</label>

<input 
type="password"
id="password"
placeholder="******"
required
>



<label>
Rol
</label>

<select id="rol">

<option value="usuario">
Usuario
</option>

<option value="doctor">
Doctor
</option>

</select>



<button type="submit">
Registrarse
</button>


</form>


<br>


<a href="login.html">
Volver al login
</a>


</div>


</div>



<script src="js/api.js"></script>
<script src="js/register.js"></script>


</body>

</html>
